server {
    listen 80;
    server_name _;

    # Default document root
    root /usr/share/nginx/html;
    autoindex off;

    # Simple health
    location = /hello.txt {
        try_files $uri =404;
        add_header Cache-Control "no-store";
    }

    # Big file for range/resume
    location = /bigfile.bin {
        try_files $uri =404;
        add_header Cache-Control "no-store";
        types { }
        default_type application/octet-stream;
    }

    # Error status endpoints
    location = /status/404 { return 404 "not found by nginx\n"; }
    location = /status/500 { return 500 "internal error by nginx\n"; }

    # Redirects (explicit host:port to preserve :18080)
    location = /redirect-hello { return 302 http://127.0.0.1:18080/hello.txt; }
    location = /redirect1 { return 302 http://127.0.0.1:18080/redirect2; }
    location = /redirect2 { return 301 http://127.0.0.1:18080/hello.txt; }

    # Redirect loop (will cause too many redirects)
    location = /loop1 { return 302 http://127.0.0.1:18080/loop2; }
    location = /loop2 { return 302 http://127.0.0.1:18080/loop1; }

    # Slow endpoint: serve the same big file but with low rate
    # Use alias to point to the bigfile and throttle
    location = /slow/bigfile.bin {
        alias /usr/share/nginx/html/bigfile.bin;
        limit_rate 1k;
        types { }
        default_type application/octet-stream;
        add_header Cache-Control "no-store";
    }
}
